# Overlay on top of training/compose/docker-compose.train.yml to wire training → MLflow tracking server.
# Usage:
#   docker compose \
#     -f training/compose/docker-compose.train.yml \
#     -f training/compose/docker-compose.train.mlflow.yml \
#     run --rm minimind-trainer

services:
  minimind-trainer:
    environment:
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI:-http://host.docker.internal:5000}"
      MLFLOW_EXPERIMENT_NAME: "${MLFLOW_EXPERIMENT_NAME:-minimind-pretrain}"
      MLFLOW_ARTIFACT_UPLOAD: "${MLFLOW_ARTIFACT_UPLOAD:-0}"
      MLFLOW_ENABLE_SYSTEM_METRICS_LOGGING: "${MLFLOW_ENABLE_SYSTEM_METRICS_LOGGING:-true}"
      MLFLOW_SYSTEM_METRICS_SAMPLING_INTERVAL: "${MLFLOW_SYSTEM_METRICS_SAMPLING_INTERVAL:-5}"
      MLFLOW_SYSTEM_METRICS_SAMPLES_BEFORE_LOGGING: "${MLFLOW_SYSTEM_METRICS_SAMPLES_BEFORE_LOGGING:-1}"
      MLFLOW_HTTP_REQUEST_MAX_RETRIES: "${MLFLOW_HTTP_REQUEST_MAX_RETRIES:-7}"
      MLFLOW_HTTP_REQUEST_TIMEOUT: "${MLFLOW_HTTP_REQUEST_TIMEOUT:-120}"
      MLFLOW_START_TIMEOUT_SECONDS: "${MLFLOW_START_TIMEOUT_SECONDS:-180}"
      MLFLOW_START_RETRY_SECONDS: "${MLFLOW_START_RETRY_SECONDS:-5}"
      MLFLOW_PEAK_TFLOPS_PER_GPU: "${MLFLOW_PEAK_TFLOPS_PER_GPU:-0.0}"
      MLFLOW_TIME_TO_TARGET_METRIC: "${MLFLOW_TIME_TO_TARGET_METRIC:-none}"
      MLFLOW_TIME_TO_TARGET_VALUE: "${MLFLOW_TIME_TO_TARGET_VALUE:-0.0}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
