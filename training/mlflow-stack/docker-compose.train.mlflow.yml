# Overlay on top of ../docker-compose.train.yml to wire training → MLflow tracking server.
# Usage:
#   docker compose \
#     -f training/docker-compose.train.yml \
#     -f training/mlflow-stack/docker-compose.train.mlflow.yml \
#     run --rm minimind-trainer

services:
  minimind-trainer:
    environment:
      MLFLOW_TRACKING_URI: http://host.docker.internal:5000
      MLFLOW_EXPERIMENT_NAME: minimind-pretrain
      MLFLOW_ENABLE_SYSTEM_METRICS_LOGGING: "true"
      MLFLOW_SYSTEM_METRICS_SAMPLING_INTERVAL: "5"
      MLFLOW_SYSTEM_METRICS_SAMPLES_BEFORE_LOGGING: "1"
      MLFLOW_HTTP_REQUEST_MAX_RETRIES: "7"
      MLFLOW_HTTP_REQUEST_TIMEOUT: "120"
    extra_hosts:
      - "host.docker.internal:host-gateway"
