name: live-checks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  live-checks:
    name: live-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install live-test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quality]"
          python -m pip install -e ".[test]"
          python -m pip install "requests>=2.32,<3" "httpx>=0.27,<1"

      - name: Run optional live lane
        run: make test-live
