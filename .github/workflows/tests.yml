name: tests

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      seeker-postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
          POSTGRES_DB: mlflow
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U mlflow -d mlflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quality]"
          python -m pip install -e ".[test]"
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.10.0+cpu
          python -m pip install "requests>=2.32,<3" "httpx>=0.27,<1"

      - name: Run required test lane
        run: make test-fast

      - name: Upload JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: .artifacts/junit.xml
          if-no-files-found: ignore

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: .artifacts/coverage.xml
          if-no-files-found: ignore
