name: quality

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[quality]"

      - name: Style guardrails
        run: make style-check

      - name: Package sanity
        run: python -m gpupoor --help
