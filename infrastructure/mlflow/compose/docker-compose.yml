name: verda-mlflow

services:
  mlflow-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
      # connection tuning for concurrent MLflow gunicorn workers
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=16MB
      - -c
      - synchronous_commit=off
    volumes:
      - mlflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.verda.emulation: "true"
      com.verda.profile: "mlflow-meta"

  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: verda-mlflow:local
    restart: unless-stopped
    depends_on:
      mlflow-postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@mlflow-postgres:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: ${MLFLOW_ARTIFACTS_DESTINATION:-/mlflow/artifacts}
      MLFLOW_WORKERS: "4"
      MLFLOW_TIMEOUT: "300"
      # SQLAlchemy pool tuning (env honored by MLflow core)
      MLFLOW_SQLALCHEMYSTORE_POOL_SIZE: "20"
      MLFLOW_SQLALCHEMYSTORE_MAX_OVERFLOW: "40"
      MLFLOW_SQLALCHEMYSTORE_POOL_RECYCLE: "3600"
      MLFLOW_HTTP_REQUEST_MAX_RETRIES: "7"
      MLFLOW_HTTP_REQUEST_TIMEOUT: "120"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-auto}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-}
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    labels:
      com.verda.emulation: "true"
      com.verda.profile: "mlflow-server"
      com.verda.port: "5000"

volumes:
  mlflow-pg-data:
    name: verda-mlflow-pg-data
  mlflow-artifacts:
    name: verda-mlflow-artifacts

networks:
  default:
    name: verda-mlflow
    driver: bridge
