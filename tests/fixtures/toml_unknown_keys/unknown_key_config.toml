name = "unknown_key_probe"
mystery_top_level = "should be ignored"

[recipe]
kind = "minimind_pretrain"
prepare_data = true
dataset_path = "data/datasets/pretrain_t2t_mini.jsonl"
output_dir = "data/minimind-out"
time_cap_seconds = 120

[backend]
kind = "local"
skip_build = false
keep_tunnel = false
pull_artifacts = false
mystery_backend_key = "should be ignored"

[mlflow]
experiment_name = "minimind-pretrain"
artifact_upload = false

[doctor]
skip_preflight = false
max_clock_skew_seconds = 5

[smoke]
cpu = true
base_image = "nvidia/cuda:12.4.1-runtime-ubuntu22.04"
health_port = 8000
health_timeout_seconds = 30
strict_port = 18001
degraded_port = 18002
