name = "runpod-e2e-test"

[recipe]
kind = "minimind_pretrain"
prepare_data = false
dataset_path = "data/datasets/pretrain_t2t_mini"
output_dir = "data/minimind-out"
time_cap_seconds = 600
max_seq_len = 4096
validation_split_ratio = 0.0
validation_interval_steps = 0

[training]
epochs = 1
batch_size = 8
learning_rate = 0.0005
accumulation_steps = 4
num_workers = 8
grad_clip = 1.0
hidden_size = 4096
num_hidden_layers = 16
dropout = 0.0
vocab_size = 6400
flash_attn = true
num_attention_heads = 8
num_key_value_heads = 4
hidden_act = "silu"
intermediate_size = 1536
max_position_embeddings = 32768
rms_norm_eps = 0.000001
rope_theta = 1000000.0
inference_rope_scaling = false
dtype = "bfloat16"
log_interval = 20
save_interval = 1000
use_compile = true
use_moe = false
num_experts = 4
num_experts_per_tok = 1
moe_intermediate_size = 1536
norm_topk_prob = true
router_aux_loss_coef = 0.0005
save_weight = "pretrain"
from_weight = "none"
from_resume = false
lr_schedule = "cosine"
lr_warmup_steps = 0
lr_min_ratio = 0.1

[backend]
kind = "dstack"
skip_build = true
remote_image_tag = "1d2662a-noattest"

[mlflow]
experiment_name = "e2e-runpod-test"
artifact_upload = true
enable_system_metrics_logging = true
system_metrics_sampling_interval = 5
system_metrics_samples_before_logging = 1
http_request_max_retries = 7
http_request_timeout_seconds = 120
start_timeout_seconds = 180
start_retry_seconds = 5
peak_tflops_per_gpu = 312.0
time_to_target_metric = "none"

[doctor]
skip_preflight = false
max_clock_skew_seconds = 5

[remote]
env_file = ".env.remote"
vcr_image_base = "alextay96/gpupoor"
dstack_server_health_url = "http://127.0.0.1:3000/"
mlflow_health_url = "http://127.0.0.1:5000/health"
health_timeout_seconds = 5
dstack_server_start_timeout_seconds = 60
run_start_timeout_seconds = 7200
backends = ["runpod"]
gpu_names = ["H100", "H200"]
gpu_count = 1
spot_policy = "auto"
max_price = 4.00

[smoke]

[seeker]
poll_seconds = 30
max_offer_age_seconds = 300
max_submit_retries = 300

[dashboard]
# Container-specific URL overrides (Docker internal DNS)
dstack_server_url = "http://dstack-server:3000"
mlflow_url = "http://mlflow:5000"
